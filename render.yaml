# One-click deploy config for Render (https://render.com).
# After connecting your GitHub repo, Render reads this file and sets up the
# service automatically. You still fill in the secret values in the dashboard.
services:
  - type: web
    name: nfc-dropbox-logger
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: API_TOKEN
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
      - key: DROPBOX_FILE_PATH
        value: /nfc_log.xlsx
      - key: TIMEZONE
        value: America/Chicago
